# Render Blueprint for the price-book ingestion worker.
# Deploy: in Render, "New +" -> "Blueprint", point at this repo. Render reads
# this file. Then set the four secret env vars below in the Render dashboard.
services:
  - type: web
    name: price-book-worker
    runtime: node
    rootDir: services/price-book-worker
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
